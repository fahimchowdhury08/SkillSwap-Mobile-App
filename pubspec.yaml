name: skillswap
description: University peer-to-peer skill exchange mobile app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ────────────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── Video Calling ──────────────────────────────────────────────
  jitsi_meet_flutter_sdk: ^12.1.3

  # ── Camera ────────────────────────────────────────────────────
  camera: ^0.11.0+2

  # ── UI Components ─────────────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  flutter_rating_bar: ^4.0.1
  confetti: ^0.7.0
  lottie: ^3.1.2
  photo_view: ^0.15.0

  # ── Media & Files and videos ─────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  video_player: ^2.8.6

  # ── Permissions ───────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Navigation & URLs ─────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── File handling (APK) ────────────────────────────────────────
  dio: ^5.4.0
  open_file: ^3.3.2
  path_provider: ^2.1.3

  # ── Utilities ─────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - .env
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400